name: SeptaZip
options:
  bundleIdPrefix: com.septazip
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"
  generateEmptyDirectories: true
  groupOrdering:
    - order: [SevenZipMac, FinderExtension, Scripts]

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ARCHS: "$(ARCHS_STANDARD)"
    VALID_ARCHS: arm64 x86_64
    ONLY_ACTIVE_ARCH: false
    CODE_SIGN_IDENTITY: "-"  # Ad-hoc signing (no Apple Developer account needed)
    CODE_SIGN_STYLE: Manual

targets:

  # ── Main Application ──────────────────────────────────────────────
  SeptaZip:
    type: application
    platform: macOS
    sources:
      - path: SevenZipMac
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: SevenZipMac/Resources/Assets.xcassets
      - path: SevenZipMac/Resources/7zz
        optional: true
        buildPhase: resources
    info:
      path: SevenZipMac/Resources/Info.plist
      properties:
        CFBundleDisplayName: SeptaZip
        CFBundleDocumentTypes:
          - CFBundleTypeName: Archive
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            CFBundleTypeExtensions:
              - 7z
              - zip
              - rar
              - tar
              - gz
              - bz2
              - xz
              - zst
              - iso
              - dmg
              - wim
              - cab
              - rpm
              - deb
    entitlements:
      path: SevenZipMac/Entitlements/SevenZipMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.septazip.SeptaZip
        PRODUCT_NAME: "SeptaZip"
        INFOPLIST_FILE: SevenZipMac/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SevenZipMac/Entitlements/SevenZipMac.entitlements
        CODE_SIGN_IDENTITY: "-"  # Ad-hoc signing
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    dependencies:
      - target: FinderExtension
        embed: true
        codeSign: true
        copy:
          destination: plugins
    preBuildScripts:
      - name: "Bundle 7zz Binary"
        script: |
          if [ ! -f "${SRCROOT}/SevenZipMac/Resources/7zz" ]; then
            echo "warning: 7zz binary not found. Run Scripts/build_7zz.sh first."
            exit 0
          fi
          mkdir -p "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          cp "${SRCROOT}/SevenZipMac/Resources/7zz" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/7zz"
          chmod +x "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/7zz"
        basedOnDependencyAnalysis: false

  # ── Finder Extension ──────────────────────────────────────────────
  FinderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FinderExtension
        excludes:
          - "Info.plist"
    info:
      path: FinderExtension/Info.plist
      properties:
        CFBundleDisplayName: SeptaZip Finder Extension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).FinderSync"
    entitlements:
      path: FinderExtension/FinderExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.septazip.SeptaZip.FinderExtension
        PRODUCT_NAME: "SeptaZip Finder Extension"
        INFOPLIST_FILE: FinderExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: FinderExtension/FinderExtension.entitlements
        CODE_SIGN_IDENTITY: "-"  # Ad-hoc signing
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SKIP_INSTALL: YES

schemes:
  SeptaZip:
    build:
      targets:
        SeptaZip: all
        FinderExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
